# SonarCloud Configuration
# This file configures SonarCloud analysis for your project

# Required: Project identification
# Update these values for your specific project
sonar.projectKey=your-organization_your-project-name
sonar.organization=your-organization

# Project metadata
sonar.projectName=Your Project Name
sonar.projectVersion=0.1.0

# Source code location
sonar.sources=src
sonar.tests=tests

# Python-specific settings
sonar.language=py
sonar.python.version=3.13

# Source encoding
sonar.sourceEncoding=UTF-8

# Test execution reports (if using pytest with coverage)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclude patterns (adjust as needed)
sonar.exclusions=**/tests/**,**/__pycache__/**,**/venv/**,**/.venv/**,**/node_modules/**,**/dist/**,**/build/**

# Coverage exclusions (files to exclude from coverage metrics)
sonar.coverage.exclusions=**/tests/**,**/__init__.py

# Duplication exclusions
sonar.cpd.exclusions=**/tests/**

# Additional analysis parameters
sonar.qualitygate.wait=true
