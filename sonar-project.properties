# SonarQube Configuration (self-hosted)

sonar.host.url=http://187.77.215.215:9000
sonar.projectKey=builder-profile
sonar.projectName=Builder Profile
sonar.projectVersion=0.2.0

# Source code location
sonar.sources=src
sonar.tests=tests

# Python-specific settings
sonar.language=py
sonar.python.version=3.13

# Source encoding
sonar.sourceEncoding=UTF-8

# Test execution reports (if using pytest with coverage)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclude patterns (adjust as needed)
sonar.exclusions=**/tests/**,**/__pycache__/**,**/venv/**,**/.venv/**,**/node_modules/**,**/dist/**,**/build/**

# Coverage exclusions (files to exclude from coverage metrics)
sonar.coverage.exclusions=**/tests/**,**/__init__.py

# Duplication exclusions
sonar.cpd.exclusions=**/tests/**
